<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if page.url == "/" %}
    <title>{{ site.title }}</title>
    {% else %}
    <title>{{ page.title }} - {{ site.title }}</title>
    {% endif %}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="favicon" href="{{ site.favicon | relative_url }}" type="image/x-icon">
  <link rel="icon" href="{{ site.favicon | relative_url }}" type="image/x-icon">
  <link rel="apple-touch-icon" href="{{ site.apple_touch_icon | relative_url }}">
  <script src="https://kit.fontawesome.com/36bbf2427b.js" crossorigin="anonymous"></script>
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
</head>
