# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: DATALab - Northern Illinois University
email: alhoori@niu.edu
description: >- # this means to ignore newlines until "baseurl:"
  DATALab is a research group at the Department of Computer Science at Northern Illinois University. 
  Our research focuses on data science, machine learning, and artificial intelligence. 
  We work on a variety of projects, including data mining, natural language processing, computer vision, 
  and large language models.
footer_description: >- # this means to ignore newlines until "baseurl:"
  DATALab at Northern Illinois University is always looking for passionate researchers and prospective 
  PhD students to join our team. If you are interested in collaborating on cutting-edge research in data science, 
  machine learning, or artificial intelligence, we encourage you to get in touch. Send us an email to 
  introduce yourself and your research interests.
domain: datalab-niu.github.io
baseurl: "" # the subpath of your site, e.g. /blog
url: https://datalab-niu.github.io
twitter_username: alhoori
github_username:  DATALab-NIU
researchgate_url: https://www.researchgate.net/lab/DATA-Lab-Hamed-Alhoori
logo: /assets/images/datalab-logo-horizontal-alt.png
niu_logo: /assets/images/niu-logo.png
favicon: /assets/images/datalab-icon.png
base_color: "#377FCC"
niu_color: "#C8102E"
page_excerpts: true

collections:
  members:
    sort_by: order
    output: true

# Build settings
theme: minima
plugins:
  - jekyll-feed

